services:
  postgres:
    image: postgres:17
    container_name: inferenceops-postgres
    environment:
      POSTGRES_DB: inferenceops
      POSTGRES_USER: inferenceops
      POSTGRES_PASSWORD: inferenceops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inferenceops -d inferenceops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: inferenceops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
